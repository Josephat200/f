<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grasp Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-photo" aria-hidden="true"></div>
  <div class="background-glow" aria-hidden="true"></div>

  <header class="site-header">
    <nav aria-label="Main navigation">
      <ul class="nav-links">
        <li><a href="#">FLORENCE</a></li>
        <li><a href="#">DESIGN</a></li>
        <li><a href="#">WHO WE ARE</a></li>
        <li><a href="#">WHAT WE DO</a></li>
        <li><a href="#">CONTACTS</a></li>
      </ul>
    </nav>
  </header>

  <main class="hero">
    <p class="eyebrow">creating sustainably</p>
    <h1>Creating innovative and sustainable experiences</h1>

    <div class="hero-arrow hero-arrow-main" aria-hidden="true"></div>

    <div class="hero-arrow-group" aria-label="Slide controls">
      <button class="hero-arrow" id="prevSlide" type="button" aria-label="Previous slide">
        <span aria-hidden="true">&#8592;</span>
      </button>
      <button class="hero-arrow" id="nextSlide" type="button" aria-label="Next slide">
        <span aria-hidden="true">&#8594;</span>
      </button>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
